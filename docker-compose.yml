# docker-compose.yml
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hostel_management
      MYSQL_USER: hostel_user
      MYSQL_PASSWORD: hostel_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hostel_network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - hostel_network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_NAME: hostel_management
      DB_USER: hostel_user
      DB_PASSWORD: hostel_password
      REDIS_HOST: redis
      JWT_SECRET: your-secret-key-here
    depends_on:
      - mysql
      - redis
    networks:
      - hostel_network
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    depends_on:
      - backend
    networks:
      - hostel_network

volumes:
  mysql_data:

networks:
  hostel_network:
    driver: bridge